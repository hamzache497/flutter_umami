name: umami_flutter
description: A lightweight Flutter package for Umami analytics with non-blocking initialization and automatic device info collection.
version: 0.1.0

environment:
  sdk: ^3.7.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  device_info_plus: ^11.5.0
  android_id: ^0.5.1
  flutter_secure_storage: ^9.2.4
  uuid: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
